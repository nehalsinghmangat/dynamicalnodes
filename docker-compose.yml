# Linux only: run `xhost +local:docker` on the host before `docker compose up`
# macOS: install XQuartz and set DISPLAY=host.docker.internal:0
# network_mode: host is required for ROS2 DDS node discovery; ignored on macOS/Windows Docker Desktop

services:
  dynamicalnodes:
    build: .
    environment:
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host
    stdin_open: true
    tty: true
