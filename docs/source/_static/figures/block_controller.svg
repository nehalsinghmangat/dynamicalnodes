<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="100" viewBox="0 0 300 100"
     xmlns="http://www.w3.org/2000/svg">
  <!-- r_k input (orange) -->
  <line x1="0" y1="30" x2="72" y2="30" stroke="#000000" stroke-width="1.2"/>
  <polygon points="72,27 80,30 72,33" fill="#000000"/>
  <text x="40" y="23" text-anchor="middle"
        font-style="italic"
        font-family="CMU Serif, Latin Modern Roman, STIX Two Text, serif"
        font-size="13" fill="#ff7f00">r<tspan dy="4" font-size="10">k</tspan></text>
  <!-- x̂_k input (blue) -->
  <line x1="0" y1="70" x2="72" y2="70" stroke="#000000" stroke-width="1.2"/>
  <polygon points="72,67 80,70 72,73" fill="#000000"/>
  <text x="40" y="63" text-anchor="middle"
        font-style="italic"
        font-family="CMU Serif, Latin Modern Roman, STIX Two Text, serif"
        font-size="13" fill="#0000ff">x̂<tspan dy="4" font-size="10">k</tspan></text>
  <!-- block -->
  <a href="#" style="cursor:pointer;">
    <rect x="80" y="10" width="140" height="80"
          fill="none" stroke="#ff4c4c" stroke-width="1.8"/>
    <text x="150" y="43" text-anchor="middle"
          font-weight="bold" font-style="normal"
          font-family="CMU Serif, Latin Modern Roman, STIX Two Text, serif"
          font-size="14" fill="#000000">Controller</text>
    <text x="150" y="65" text-anchor="middle"
          font-style="italic"
          font-family="CMU Serif, Latin Modern Roman, STIX Two Text, serif"
          font-size="13" fill="#000000">(f<tspan dy="4" font-size="10">c</tspan><tspan dy="-4">, h</tspan><tspan dy="4" font-size="10">c</tspan><tspan dy="-4">)</tspan></text>
  </a>
  <!-- u_k output (red) -->
  <line x1="220" y1="50" x2="284" y2="50" stroke="#000000" stroke-width="1.2"/>
  <polygon points="284,47 292,50 284,53" fill="#000000"/>
  <text x="256" y="43" text-anchor="middle"
        font-style="italic"
        font-family="CMU Serif, Latin Modern Roman, STIX Two Text, serif"
        font-size="13" fill="#ff0000">u<tspan dy="4" font-size="10">k</tspan></text>
</svg>
